name: PaperPlatform
version: "${version}"
main: com.axogc.paper.PaperPlatformPlugin
api-version: "1.21"
authors: [platform]
description: Game community platform integration (long-poll + stats + binding)
load: STARTUP
commands:
  bind:
    description: Bind your in-game name to a platform account using a 6-char code
    usage: /bind <CODE>
  web:
    description: Show the platform web URL
    usage: /web
  docs:
    description: Browse documentation in-game
    usage: /docs [path]
permissions:
  paperplatform.admin:
    description: Administrative actions for PaperPlatform
    default: op
