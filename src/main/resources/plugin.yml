name: PaperPlatform
version: "${version}"
main: net.axogc.paper.PaperPlatformPlugin
api-version: "1.21"
authors: [platform]
description: Game community platform integration (long-poll + stats + binding)
load: STARTUP
commands:
  axo:
    description: Axolotland platform commands
    usage: /axo <bind|web|docs|help> [args...]
    aliases: [axogc]
permissions:
  paperplatform.admin:
    description: Administrative actions for PaperPlatform
    default: op
